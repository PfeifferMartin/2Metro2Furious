<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metro Run: Kartoffelsalat-Edition</title>
    <!-- Modern Font for the UI -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Metro Colors for Themeing */
            --metro-blue: #004b87;
            --metro-yellow: #ffc627;
            --text-dark: #2c3e50;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            /* Prevents scrolling/refresh gestures on mobile */
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            max-height: 900px; /* limit height for super tall screens */
            background-color: #f4f4f4;
            /* Tiled Grocery Store Floor pattern */
            background-image: 
                linear-gradient(45deg, #e9e9e9 25%, transparent 25%, transparent 75%, #e9e9e9 75%, #e9e9e9), 
                linear-gradient(45deg, #e9e9e9 25%, transparent 25%, transparent 75%, #e9e9e9 75%, #e9e9e9);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .flash {
            background-color: var(--metro-yellow) !important;
            background-image: none !important;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--metro-blue);
            z-index: 10;
            pointer-events: none;
            /* Outline effect to make text pop on the background */
            text-shadow: 1px 1px 0px #fff, -1px -1px 0px #fff, 1px -1px 0px #fff, -1px 1px 0px #fff, 0 3px 5px rgba(0,0,0,0.4);
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
            padding: 30px;
            box-sizing: border-box;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 5px;
            color: var(--metro-blue);
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 4px 4px 0px var(--metro-yellow);
            line-height: 1.1;
        }

        p {
            font-size: 1.25rem;
            color: var(--text-dark);
            margin-bottom: 40px;
            max-width: 90%;
            font-weight: 700;
        }

        button {
            background: var(--metro-blue);
            color: var(--metro-yellow);
            border: 4px solid var(--metro-yellow);
            padding: 18px 45px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(0,75,135,0.4);
            transition: transform 0.1s, box-shadow 0.1s;
            pointer-events: auto;
        }

        button:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(0,75,135,0.4);
        }

        #player {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4.5rem; /* Large cart */
            z-index: 5;
            user-select: none;
            /* Drop shadow specifically modeled for emoji */
            filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.3));
            will-change: left;
        }

        .item {
            position: absolute;
            font-size: 3rem;
            user-select: none;
            z-index: 4;
            filter: drop-shadow(0px 5px 8px rgba(0,0,0,0.3));
            will-change: top, left;
        }
        
        .floating-text {
            position: absolute;
            font-size: 2rem;
            font-weight: 900;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.7);
            z-index: 15;
            pointer-events: none;
            transition: all 0.8s ease-out;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Overlay UI inside the boundary -->
    <div id="ui-layer">
        <div id="score-display">Wagerl-Wert: 0 €</div>
        <div id="lives-display">🥩🥩🥩</div>
    </div>
    
    <!-- Player Element -->
    <div id="player">🛒</div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen">
        <h1>Metro Run</h1>
        <p>Sammle Fleisch, Wurst und Speck für die Metzgerei! <strong>Meide</strong> jegliches Gemüse!</p>
        <button id="start-btn">Einkauf starten</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen hidden">
        <h1>Ausverkauf!</h1>
        <p>Dein finaler Wagerl-Wert:<br>
            <span id="final-score" style="font-size: 3rem; color: var(--metro-blue); text-shadow: 2px 2px 0px var(--metro-yellow); display: block; margin-top: 10px;">0 €</span>
        </p>
        <button id="restart-btn">Nochmal in den Metro</button>
    </div>
</div>

<script>
    // Elements caching
    const container = document.getElementById('game-container');
    const player = document.getElementById('player');
    const scoreDisplay = document.getElementById('score-display');
    const livesDisplay = document.getElementById('lives-display');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreDisplay = document.getElementById('final-score');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');

    // Game state
    let state = 'start'; // 'start', 'playing', 'gameover'
    let score = 0;
    let lives = 3;
    let items = [];
    let playerX = 0;
    
    let lastTime = 0;
    let spawnTimer = 0;
    let baseSpeed = 250; 
    let spawnInterval = 1200; 

    // Item Dictionary Settings
    const ITEM_TYPES = [
        // Good Items (Metzgerei / Butcher)
        { emoji: '🥩', type: 'good', points: 10, weight: 30 }, // Steak
        { emoji: '🍖', type: 'good', points: 15, weight: 25 }, // Fleisch am Knochen
        { emoji: '🥓', type: 'good', points: 15, weight: 20 }, // Speck
        { emoji: '🌭', type: 'good', points: 5,  weight: 35 }, // Wurst
        { emoji: '🍗', type: 'good', points: 10, weight: 25 }, // Hähnchenkeule
        { emoji: '🍔', type: 'good', points: 20, weight: 15 }, // Burger (Fleisch)
        { emoji: '🐖', type: 'good', points: 25, weight: 10 }, // Schwein
        { emoji: '🐄', type: 'good', points: 25, weight: 10 }, // Kuh
        
        // Special Items
        { emoji: '🔪', type: 'special', points: 50, weight: 3 }, // Metzger-Messer
        { emoji: '🏆', type: 'special', points: 100, weight: 1 }, // Pokal / goldene Wurst

        // Bad Items (Gemüse & Veganes)
        { emoji: '🌱', type: 'bad', points: 0, weight: 10 }, // Setzling
        { emoji: '🥦', type: 'bad', points: 0, weight: 10 }, // Brokkoli
        { emoji: '🥕', type: 'bad', points: 0, weight: 10 }, // Karotte
        { emoji: '🍅', type: 'bad', points: 0, weight: 10 }, // Tomate
        { emoji: '🥗', type: 'bad', points: 0, weight: 10 }, // Salat
        { emoji: '🥒', type: 'bad', points: 0, weight: 10 }, // Gurke
        { emoji: '🥬', type: 'bad', points: 0, weight: 10 }, // Blattgemüse
        { emoji: '🍆', type: 'bad', points: 0, weight: 10 }, // Aubergine
        { emoji: '🌽', type: 'bad', points: 0, weight: 10 }, // Mais
        { emoji: '🥔', type: 'bad', points: 0, weight: 10 }, // Kartoffel (jetzt auch böse!)
        { emoji: '🧅', type: 'bad', points: 0, weight: 10 }, // Zwiebel
        { emoji: '🧄', type: 'bad', points: 0, weight: 10 }, // Knoblauch
        { emoji: '🥑', type: 'bad', points: 0, weight: 10 }, // Avocado
        { emoji: '🍄', type: 'bad', points: 0, weight: 10 }, // Pilz
        { emoji: '🫑', type: 'bad', points: 0, weight: 10 }, // Paprika
    ];

    function initGame() {
        // Reset states
        score = 0;
        lives = 3;
        
        // Remove all current items
        items.forEach(i => i.element.remove());
        items = [];
        
        // Setup initial player position (centered)
        let initialRect = container.getBoundingClientRect();
        playerX = initialRect.width / 2;
        updatePlayerPos();
        updateUI();
        
        // Transition screens
        state = 'playing';
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    }

    function spawnItem() {
        // Select an item randomly based on pre-defined weight config
        let totalWeight = ITEM_TYPES.reduce((acc, obj) => acc + obj.weight, 0);
        let rand = Math.random() * totalWeight;
        let selectedType = ITEM_TYPES[0];
        
        for (let type of ITEM_TYPES) {
            if (rand < type.weight) {
                selectedType = type;
                break;
            }
            rand -= type.weight;
        }

        // Create DOM element
        const el = document.createElement('div');
        el.className = 'item';
        el.innerText = selectedType.emoji;
        container.appendChild(el);
        
        // Compute the dimension and boundaries safely
        const size = el.offsetWidth || 50; 
        const maxX = container.offsetWidth - size;
        const x = Math.max(0, Math.random() * maxX);

        items.push({
            element: el,
            type: selectedType,
            x: x,
            y: -80, // Offset spawn point to originate outside upper container
        });
    }

    // Keyboard Input Handling Arrays
    const keys = { ArrowLeft: false, ArrowRight: false };
    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
    });
    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
    });

    // Unified Mobile Tap/Touch handler utility
    function movePlayerTo(clientX) {
        if (state !== 'playing') return;
        
        const rect = container.getBoundingClientRect();
        let x = clientX - rect.left;
        
        // Boundary confinement accounting for roughly 50% of the player's cart width
        const playerWidth = player.offsetWidth || 80;
        x = Math.max(playerWidth / 2, Math.min(x, rect.width - playerWidth / 2));
        playerX = x;
        updatePlayerPos();
    }

    // Connect Touch event handlers onto main box
    container.addEventListener('touchmove', (e) => {
        if (state !== 'playing') return;
        e.preventDefault(); 
        movePlayerTo(e.touches[0].clientX);
    }, { passive: false });

    container.addEventListener('touchstart', (e) => {
        if (state === 'playing') movePlayerTo(e.touches[0].clientX);
    }, { passive: true });

    // Desktop Mouse Drag capabilities (for testing or PC fun)
    let isDragging = false;
    container.addEventListener('mousedown', (e) => {
        if (state === 'playing') {
            isDragging = true;
            movePlayerTo(e.clientX);
        }
    });

    window.addEventListener('mousemove', (e) => {
        if (isDragging && state === 'playing') {
            movePlayerTo(e.clientX);
        }
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
    });

    function updatePlayerPos() {
        player.style.left = playerX + 'px';
    }

    function updateUI() {
        scoreDisplay.innerText = `Wagerl-Wert: ${score} €`;
        
        // Render Life-Icons natively replacing missing hearts with an X
        let livesText = '';
        for (let i = 0; i < 3; i++) {
            livesText += (i < lives) ? '🥩' : '❌';
        }
        livesDisplay.innerText = livesText;
    }

    function flashScreen() {
        container.classList.add('flash');
        setTimeout(() => {
            container.classList.remove('flash');
        }, 150);
    }

    function createFloatingText(text, x, y, color) {
        const txt = document.createElement('div');
        txt.className = 'floating-text';
        txt.innerText = text;
        txt.style.left = x + 'px';
        txt.style.top = y + 'px';
        txt.style.color = color;
        
        // Push object directly to map 
        container.appendChild(txt);

        // Queue animation frame payload execution natively over timeline 
        requestAnimationFrame(() => {
            txt.style.top = (y - 50) + 'px';
            txt.style.opacity = '0';
        });
        
        // Remove detached ghost DOM instance afterward
        setTimeout(() => txt.remove(), 800);
    }

    function gameLoop(time) {
        if (state !== 'playing') return;

        // Calculate frame's elapsed delta metric linearly
        const dt = (time - lastTime) / 1000;
        lastTime = time;

        const playerWidth = player.offsetWidth || 80;

        // Arrow Key logic mapped onto time slices 
        const speed = 600; 
        if (keys.ArrowLeft) playerX -= speed * dt;
        if (keys.ArrowRight) playerX += speed * dt;
        
        // Ensure bounds validation runs on every keyboard hook step
        playerX = Math.max(playerWidth / 2, Math.min(playerX, container.offsetWidth - playerWidth / 2));
        updatePlayerPos();

        // Formula: Scaled progression coefficient that accelerates items consistently
        // Example: 300 pts implies a theoretical doubled progression loop (2x) compared to start!
        const diffMult = 1 + (score / 300);

        // Determine whether enough timer threshold elapsed -> Release an entity 
        spawnTimer += dt * 1000;
        const currentSpawnInterval = Math.max(350, spawnInterval / diffMult); 
        
        if (spawnTimer >= currentSpawnInterval) {
            spawnTimer = 0;
            spawnItem();
        }

        const fallSpeed = baseSpeed * diffMult;
        
        // Build Collision Maps utilizing client Rect bounding properties 
        let pRect = player.getBoundingClientRect();
        let cRect = container.getBoundingClientRect();

        // Shave off internal empty "emoji box" margins internally by scaling detection area downward natively
        let hitBox = {
            top: pRect.top + 20,
            bottom: pRect.bottom,
            left: pRect.left + 10,
            right: pRect.right - 10
        };

        // Traverse entities backward ensuring removal indices do not skew subsequent processing
        for (let i = items.length - 1; i >= 0; i--) {
            let item = items[i];
            
            // Advance entity translation and inject inline styles 
            item.y += fallSpeed * dt;
            item.element.style.top = item.y + 'px';
            item.element.style.left = item.x + 'px';

            let iRect = item.element.getBoundingClientRect();
            
            // Simple generic rectangle intersection test
            if (iRect.bottom > hitBox.top && 
                iRect.top < hitBox.bottom &&
                iRect.right > hitBox.left &&
                iRect.left < hitBox.right) {
                
                // Collision happened! Apply outcome rules defined via dictionary definitions cleanly 
                let effectColor = '#fff';
                let effectText = '';

                if (item.type.type === 'good') {
                    score += item.type.points;
                    effectText = `+${item.type.points}€`;
                    effectColor = '#4CAF50';
                } else if (item.type.type === 'bad') {
                    lives--;
                    effectText = '-1 🥩';
                    effectColor = '#F44336';
                } else if (item.type.type === 'special') {
                    score += item.type.points;
                    flashScreen();
                    effectText = `+${item.type.points}€`;
                    effectColor = '#FFD100'; // special metro yellow
                }

                // Render floating visual texts near extraction zone roughly 
                createFloatingText(effectText, item.x + (iRect.width / 2), item.y, effectColor);
                
                // Exterminate object correctly
                item.element.remove();
                items.splice(i, 1);
                updateUI();
                
                // Preemptive state detection sequence check 
                if (lives <= 0) {
                    gameOver();
                    return;
                }
                
                continue;
            }

            // Flush memory reference and instance out of container bounding viewport limits 
            if (iRect.top > cRect.bottom) {
                item.element.remove();
                items.splice(i, 1);
            }
        }

        requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        state = 'gameover';
        finalScoreDisplay.innerText = score + ' €'; // display final amount correctly!
        gameOverScreen.classList.remove('hidden');
    }

    // Attach click triggers internally to our interface UI buttons correctly natively 
    startBtn.addEventListener('click', initGame);
    restartBtn.addEventListener('click', initGame);

    // Reposition dynamically to prevent character from rendering outside canvas bounds when flipping display aspects
    window.addEventListener('resize', () => {
        if (state === 'playing') {
            const playerWidth = player.offsetWidth || 80;
            playerX = Math.max(playerWidth / 2, Math.min(playerX, container.offsetWidth - playerWidth / 2));
            updatePlayerPos();
        }
    });

</script>
</body>
</html>
